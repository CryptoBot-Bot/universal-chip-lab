# Build + publish the Windows installer whenever a version tag is pushed.
#
# Trigger: push a tag like v0.1.1 (or run manually from the Actions tab).
# It builds the Electron app and uploads the installer + latest.yml to a
# GitHub Release for that tag. The installed app's auto-updater reads that
# Release feed, so every tag here becomes an available update within minutes.
#
# No secrets needed for a public repo — GITHUB_TOKEN is provided automatically
# and has write access to Releases via the permissions block below.

name: Release Universal Chip Lab

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build + publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @ecu/desktop release
